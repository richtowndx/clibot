# ==============================================================================
# clibot Configuration Example
# ==============================================================================
# This is an example configuration file for clibot.
#
# Quick Start:
#   1. Copy this file to ~/.config/clibot/config.yaml
#   2. Fill in your bot credentials (see guides below)
#   3. Add your user ID to the whitelist
#   4. Run: clibot serve --config ~/.config/clibot/config.yaml
#
# For detailed setup guides, see: docs/en/setup/
#
# ==============================================================================
# Environment Variables (RECOMMENDED for sensitive data)
# ==============================================================================
# You can use environment variables for sensitive configuration like tokens
# and secrets. This keeps them out of your config file.
#
# Syntax: Use DOLLAR_SIGN + BRACES + ENV_NAME, e.g., DISCORD_TOKEN with $ and {}
#
# Setting environment variables:
#   Linux/Mac:     export DISCORD_TOKEN="your_token_here"
#   Windows (cmd):  set DISCORD_TOKEN=your_token_here
#   Windows (PS):  env:DISCORD_TOKEN="your_token_here"
#   Docker:        -e DISCORD_TOKEN="your_token_here"
#
# Benefits:
#   - More secure: credentials not in config file
#   - Easier deployment: different envs for dev/prod
#   - Git friendly: can commit config without exposing secrets
# ==============================================================================

# HTTP Hook Server Port
# Used by CLI tools to notify clibot when they finish processing
hook_server:
  port: 8080

# ==============================================================================
# Security Configuration (IMPORTANT)
# ==============================================================================
# clibot is essentially a Remote Code Execution (RCE) tool.
# Whitelist MUST be enabled to prevent unauthorized access.
security:
  # Enable whitelist (DO NOT set to false in production)
  whitelist_enabled: true

  # Allowed users - Add your user IDs here
  #
  # How to get your user ID:
  #   - Telegram: Send any message to your bot, then use 'echo' command
  #   - Discord: Send any message, use 'echo' command to see your User ID
  #   - Feishu: Use 'echo' command to see your open_id
  #   - DingTalk: Use 'echo' command to see your staff_id
  allowed_users:
    telegram:
      - "YOUR_TELEGRAM_USER_ID"     # Replace with your Telegram user_id (number)
      # Example: 123456789

    discord:
      - "YOUR_DISCORD_USER_ID"      # Replace with your Discord user_id (snowflake)
      # Example: "123456789012345678"

    feishu:
      - "YOUR_FEISHU_OPEN_ID"       # Replace with your Feishu open_id
      # Example: "ou_1234567890abcdef1234567890ab"

    dingtalk:
      - "YOUR_DINGTALK_STAFF_ID"    # Replace with your DingTalk staff_id
      # Example: "123456789"

  # Admin list - Users who can create/delete dynamic sessions
  admins:
    telegram:
      - "YOUR_TELEGRAM_USER_ID"     # Replace with admin user_id

    discord:
      - "YOUR_DISCORD_USER_ID"      # Replace with admin user_id

    feishu:
      - "YOUR_FEISHU_OPEN_ID"       # Replace with admin open_id

# ==============================================================================
# Session Configuration
# ==============================================================================
session:
  # Maximum dynamically created sessions (default: 50)
  # Limits sessions created via 'snew' command
  # Configured sessions below don't count against this limit
  max_dynamic_sessions: 50

# ==============================================================================
# Session Management
# ==============================================================================
# Configure which CLI sessions clibot should manage
#
# Mode Priority: ACP > Hook
#   - ACP: Best experience, streaming, no tmux needed
#   - Hook: Real-time, requires CLI hook configuration
# ==============================================================================
# Sessions Configuration
# ==============================================================================
# Each session represents a connection to an AI CLI tool.
#
# IMPORTANT: Session name vs CLI type
#   - name: Your custom identifier for this session (e.g., "my-project", "backend-api")
#   - cli_type: The AI CLI tool to use (acp, claude, gemini, opencode)
#
# The session name is just a label you choose to identify the session.
# It does NOT need to match the CLI type!
#
# Example:
#   sessions:
#     - name: "my-website"        # ← Your custom name (could be anything)
#       cli_type: "claude"        # ← The actual CLI tool
# ==============================================================================
sessions:
  # ============================================================================
  # ACP Mode Sessions (Recommended)
  # ============================================================================

  # Example 1: Claude Code with ACP (Best Experience)
  # Requires: claude-agent-acp installed
  - name: "my-acp-session"
    cli_type: "acp"
    work_dir: "/home/user/projects/my-project"   # ABSOLUTE path required
    start_cmd: "claude-agent-acp"                # ACP server command
    transport: "stdio://"                        # stdio transport
    auto_start: true

  # Example 2: Gemini CLI with ACP
  # Requires: gemini with --experimental-acp flag
  # - name: "my-gemini-session"
  #   cli_type: "acp"
  #   work_dir: "/home/user/projects/my-project"
  #   start_cmd: "gemini --experimental-acp"
  #   transport: "stdio://"
  #   auto_start: true

  # Example 3: ACP remote via TCP
  # - name: "my-remote-session"
  #   cli_type: "acp"
  #   work_dir: "/home/user/projects/demo"
  #   transport: "tcp://127.0.0.1:9000"

  # Example 4: ACP remote via Unix socket
  # - name: "my-unix-session"
  #   cli_type: "acp"
  #   work_dir: "/home/user/projects/demo"
  #   transport: "unix:///tmp/acp.sock"

  # ============================================================================
  # Hook Mode Sessions
  # ============================================================================

  # Example 5: Claude Code with Hook mode
  # Requires: claude CLI installed with hook configuration
  # - name: "my-project"
  #   cli_type: "claude"
  #   work_dir: "/home/user/projects/my-project"   # ABSOLUTE path required
  #   auto_start: true
  #   # start_cmd: "claude"                        # Optional: Custom startup command

  # Example 6: Gemini CLI with Hook mode
  # - name: "my-tests"
  #   cli_type: "gemini"
  #   work_dir: "/home/user/backend-tests"
  #   auto_start: false                           # Don't auto-start

  # Example 7: OpenCode with Hook mode
  # - name: "my-work"
  #   cli_type: "opencode"
  #   work_dir: "/path/to/workdir"
  #   auto_start: true

# ==============================================================================
# Bot Configuration
# ==============================================================================
bots:
  # Discord Bot
  discord:
    enabled: false  # Set to true to enable
    # Get token from: https://discord.com/developers/applications
    #
    # TIP: Use environment variables for better security
    # See docs above on how to use ENV variables in config
    token: "MTIzNDU2Nzg5MDEyMzQ1Njc4OQ.GhIjKl..."  # Replace with your bot token
    channel_id: "123456789012345678"              # Replace with your channel ID

  feishu:
    enabled: false
    app_id: "cli_a...."
    app_secret: "HTCoxSDE3...."

  # Telegram Bot
  telegram:
    enabled: false  # Set to true to enable
    # Get token from BotFather: https://t.me/BotFather
    #
    # TIP: Use environment variables for better security
    # See docs above on how to use ENV variables in config
    token: "123456789:ABCdefGHIjklMNOpqrsTUVwxyz"  # Replace with your bot token

  # DingTalk Bot
  dingtalk:
    enabled: false  # Set to true to enable
    # Get credentials from: https://open.dingtalk.com/document/org-app
    #
    # TIP: Use environment variables for better security
    # See docs above on how to use ENV variables in config
    app_id: "ding_1234567890abcd"         # Replace with your app_id
    app_secret: "abc123def456..."         # Replace with your app_secret

# ==============================================================================
# CLI Adapter Configuration
# ==============================================================================
# Configure how clibot interacts with AI CLI tools
#
# Mode Priority: ACP > Hook
#   - ACP: Best experience, configure in sessions section
#   - Hook: Real-time, requires CLI hook configuration
# ==============================================================================
cli_adapters:
  claude:
    # Hook mode configuration (currently the only supported mode)
    # Requires: Claude Code CLI with hook configuration

  gemini:
    # Hook mode configuration
    # Requires: Gemini CLI with hook configuration

  opencode:
    # Hook mode configuration
    # Requires: OpenCode CLI with hook configuration

  # ACP Adapter (Agent Client Protocol) - Recommended
  acp:
    # Timeout - max time without any activity before cancelling request
    # If the agent is actively working (sending updates), the request continues
    # Only cancelled if there's no activity for this duration
    # Default: 5 minutes. Set to "0" to use default.
    timeout: "5m"

    # Environment variables to set for the ACP server process
    # These will be passed to the ACP agent (e.g., claude, gemini)
    # env:
    #   ANTHROPIC_API_KEY: "sk-ant-..."    # For Claude Code
    #   GEMINI_API_KEY: "your-key"        # For Gemini CLI
    #   LANG: "en_US.UTF-8"                # Set locale
    #   PYTHONIOENCODING: "utf-8"          # Python encoding

    # Note: For ACP mode, timeout acts as idle timeout
    # The system monitors activity from the agent and cancels requests only when
    # there's no activity for the specified duration. This allows long-running
    # tasks to complete as long as they're producing output.

# ==============================================================================
# Logging Configuration
# ==============================================================================
logging:
  level: info  # debug, info, warn, error
  # file: /var/log/clibot/clibot.log  # Log file path
  max_size: 100  # Single file max size in MB (default: 100)
  max_backups: 5  # Number of backups to keep (default: 5)
  max_age: 30  # Maximum days to retain (default: 30)
  compress: true  # Whether to compress old logs (default: true)
  enable_stdout: true  # Also output to console (default: true)
